<!DOCTYPE html>
<html>
<head>
    <title>Detalhes do Doador</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Detalhes do Doador: {{ doador[0] }}</h1>
        <p><strong>Localização:</strong> ({{ doador[1] }}, {{ doador[2] }})</p>
        <h2 class="text-xl mb-2 mt-4">Materiais Disponíveis</h2>
        {% if materiais %}
            <ul class="mb-4">
                {% for material in materiais %}
                    <li>{{ material[0] }} - Quantidade: {{ material[1] }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p>Nenhum material disponível.</p>
        {% endif %}
        <a href="{{ url_for('dashboard', user_id=user_id) }}" class="bg-blue-500 text-white px-4 py-2 rounded">Voltar</a>
    </div>
</body>
</html>
