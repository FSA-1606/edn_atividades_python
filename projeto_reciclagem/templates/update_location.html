<!DOCTYPE html>
<html>
<head>
    <title>Atualizar Localização</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Atualizar Localização</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-{{ 'green' if category == 'success' else 'blue' if category == 'info' else 'red' }}-100 p-2 mb-4">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" class="space-y-4">
            <div class="flex space-x-2">
                <input type="number" step="any" name="latitude" id="latitude" placeholder="Latitude" value="{{ user[4] if user[4] is not none else '' }}" class="border p-2 w-full" required>
                <input type="number" step="any" name="longitude" id="longitude" placeholder="Longitude" value="{{ user[5] if user[5] is not none else '' }}" class="border p-2 w-full" required>
            </div>
            <button type="button" onclick="getLocation()" class="bg-yellow-500 text-white px-4 py-2 rounded">Obter Minha Localização</button>
            <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded">Atualizar Localização</button>
        </form>
        <a href="{{ url_for('dashboard', user_id=user[0]) }}" class="bg-blue-500 text-white px-4 py-2 rounded mt-4">Voltar</a>
    </div>
    <script>
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                alert("Geolocalização não é suportada pelo seu navegador.");
            }
        }

        function showPosition(position) {
            document.getElementById("latitude").value = position.coords.latitude;
            document.getElementById("longitude").value = position.coords.longitude;
        }

        function showError(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    alert("Permissão para acessar a localização foi negada. Por favor, permita o acesso ou insira as coordenadas manualmente.");
                    break;
                case error.POSITION_UNAVAILABLE:
                    alert("Informações de localização indisponíveis.");
                    break;
                case error.TIMEOUT:
                    alert("A solicitação de localização expirou.");
                    break;
                case error.UNKNOWN_ERROR:
                    alert("Ocorreu um erro desconhecido ao obter a localização.");
                    break;
            }
        }
    </script>
</body>
</html>
