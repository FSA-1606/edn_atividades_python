<!DOCTYPE html>
<html>
<head>
    <title>Mapa de Rotas Otimizadas</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <style>
        #map { height: 500px; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Mapa de Rotas Otimizadas</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-{{ 'green' if category == 'success' else 'blue' if category == 'info' else 'red' }}-100 p-2 mb-4">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <div id="map"></div>
        <a href="{{ url_for('dashboard', user_id=user_id) }}" class="bg-blue-500 text-white px-4 py-2 rounded mt-4 inline-block">Voltar ao Painel</a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script>
        // Inicializar o mapa
        var map = L.map('map').setView([-23.55, -46.63], 12); // Centralizar em São Paulo

        // Adicionar o tile layer (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Dados das rotas
        var routePaths = {{ route_paths | safe }};

        // Adicionar marcadores e polilinhas para cada rota
        routePaths.forEach(function(routeData) {
            var path = routeData.path;
            var color = routeData.color;

            // Adicionar marcadores
            path.forEach(function(point) {
                var marker = L.marker([point.lat, point.lng]).addTo(map);
                marker.bindPopup(`<b>${point.username}</b><br>${point.role}`);
            });

            // Criar uma polilinha para a rota
            var latlngs = path.map(function(point) {
                return [point.lat, point.lng];
            });
            var polyline = L.polyline(latlngs, {color: color, weight: 4}).addTo(map);
        });

        // Ajustar o zoom para mostrar todos os pontos
        var allPoints = [];
        routePaths.forEach(function(routeData) {
            routeData.path.forEach(function(point) {
                allPoints.push([point.lat, point.lng]);
            });
        });
        if (allPoints.length > 0) {
            map.fitBounds(allPoints);
        }
    </script>
</body>
</html>
