<!DOCTYPE html>
       <html>
       <head>
           <title>Adicionar Material</title>
           <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
       </head>
       <body class="bg-gray-100">
           <div class="container mx-auto p-4">
               <h1 class="text-2xl font-bold mb-4">Adicionar Material</h1>
               {% with messages = get_flashed_messages(with_categories=true) %}
                   {% if messages %}
                       {% for category, message in messages %}
                           <div class="bg-{{ 'green' if category == 'success' else 'red' }}-100 p-2 mb-4">{{ message }}</div>
                       {% endfor %}
                   {% endif %}
               {% endwith %}
               <form method="POST" class="space-y-4">
                   <select name="material_type" class="border p-2 w-full" required>
                       <option value="baterias">Baterias</option>
                       <option value="pilhas">Pilhas</option>
                       <option value="vidros">Vidros</option>
                       <option value="plasticos">Plásticos</option>
                   </select>
                   <input type="number" name="quantity" placeholder="Quantidade" class="border p-2 w-full" required>
                   <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Adicionar</button>
               </form>
               <a href="{{ url_for('dashboard', user_id=user_id) }}" class="text-blue-500">Voltar</a>
           </div>
       </body>
       </html>
