<!<!DOCTYPE html>
<html>
<head>
    <title>Mapa Interativo</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 500px; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Mapa de Doadores e Coletores</h1>
        <div id="map"></div>
        <a href="{{ url_for('dashboard', user_id=user_id) }}" class="bg-blue-500 text-white px-4 py-2 rounded mt-4">Voltar</a>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-23.5505, -46.6333], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        var geojson = {{ geojson_data | safe }};
        L.geoJSON(geojson, {
            pointToLayer: function(feature, latlng) {
                var color = feature.properties.role === 'doador' ? 'blue' : 'green';
                return L.circleMarker(latlng, {
                    radius: 8,
                    fillColor: color,
                    color: '#000',
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                });
            },
            onEachFeature: function(feature, layer) {
                layer.bindPopup(
                    `<b>${feature.properties.username}</b><br>${feature.properties.role === 'doador' ? 'Doador' : 'Coletor'}`
                );
            }
        }).addTo(map);
    </script>
</body>
</html>
