<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">Login</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-{{ 'green' if category == 'success' else 'blue' if category == 'info' else 'red' }}-100 text-{{ 'green' if category == 'success' else 'blue' if category == 'info' else 'red' }}-800 p-3 rounded mb-4 text-center">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Usuário:</label>
                <input type="text" id="username" name="username" required class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Senha:</label>
                <input type="password" id="password" name="password" required class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition duration-200 font-semibold">
                Entrar
            </button>
        </form>

        <div class="mt-4 text-center space-y-2">
            <a href="{{ url_for('reset_password') }}" class="block text-blue-500 hover:underline">
                <i class="fas fa-key mr-1"></i> Esqueci minha senha
            </a>
            <a href="{{ url_for('login_google') }}" class="block bg-white text-gray-700 py-2 rounded-lg border border-gray-300 hover:bg-gray-100 transition duration-200 font-semibold">
                <i class="fab fa-google mr-2"></i> Login com Google
            </a>
            <p class="text-gray-600">Não tem conta? 
                <a href="{{ url_for('register') }}" class="text-blue-500 hover:underline font-semibold">Registre-se</a>
            </p>
        </div>
    </div>
</body>
</html>
