<!DOCTYPE html>
       <html>
       <head>
           <title>Entrar</title>
           <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
       </head>
       <body class="bg-gray-100">
           <div class="container mx-auto p-4">
               <h1 class="text-2xl font-bold mb-4">Entrar</h1>
               {% with messages = get_flashed_messages(with_categories=true) %}
                   {% if messages %}
                       {% for category, message in messages %}
                           <div class="bg-{{ 'green' if category == 'success' else 'red' }}-100 p-2 mb-4">{{ message }}</div>
                       {% endfor %}
                   {% endif %}
               {% endwith %}
               <form method="POST" class="space-y-4">
                   <input type="text" name="username" placeholder="Nome de usuário" class="border p-2 w-full" required>
                   <input type="password" name="password" placeholder="Senha" class="border p-2 w-full" required>
                   <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded">Entrar</button>
               </form>
               <a href="{{ url_for('register') }}" class="text-blue-500">Não tem uma conta? Registre-se</a>
           </div>
       </body>
       </html>
